<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPIWD — Security Operations Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   DESIGN TOKENS — DARK / LIGHT
═══════════════════════════════════════════════════════════ */
:root {
  --bg:      #040608;
  --bg2:     #070c10;
  --bg3:     #0a1018;
  --panel:   #0d1520;
  --panel2:  #101d2a;
  --cyan:    #00e5ff;
  --cyan2:   #67e8f9;
  --cyan3:   rgba(0,229,255,.08);
  --green:   #00ff88;
  --red:     #ff3355;
  --amber:   #ffb700;
  --purple:  #a855f7;
  --blue:    #3b82f6;
  --white:   #e2eaf2;
  --muted:   #4a6070;
  --muted2:  #2a3a48;
  --border:  rgba(0,229,255,.1);
  --border2: rgba(255,255,255,.05);
  --shadow:  0 4px 32px rgba(0,0,0,.6);
  --glow:    0 0 24px rgba(0,229,255,.15);
  --radius:  6px;
  --f-ui:    'Inter', sans-serif;
  --f-mono:  'JetBrains Mono', monospace;
  --f-dsp:   'Barlow Condensed', sans-serif;
}
[data-theme="light"] {
  --bg:      #f0f4f8;
  --bg2:     #e6edf5;
  --bg3:     #dce6f0;
  --panel:   #ffffff;
  --panel2:  #f5f8fc;
  --cyan:    #0070e0;
  --cyan2:   #2997ff;
  --cyan3:   rgba(0,112,224,.06);
  --green:   #009944;
  --red:     #d70040;
  --amber:   #cc7000;
  --purple:  #7c3aed;
  --blue:    #1d4ed8;
  --white:   #0f172a;
  --muted:   #64748b;
  --muted2:  #dde6f0;
  --border:  rgba(0,112,224,.14);
  --border2: rgba(0,0,0,.06);
  --shadow:  0 4px 24px rgba(0,0,0,.1);
  --glow:    0 2px 14px rgba(0,112,224,.1);
}

/* ══════════════════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--white);
  font-family:var(--f-ui);font-size:13px;
  display:flex;flex-direction:column;
  transition:background .35s,color .35s;
}
[data-theme="dark"] body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,229,255,.007) 3px,rgba(0,229,255,.007) 4px);
  pointer-events:none;z-index:9000;
}

/* ══════════════════════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════════════════════ */
#loginScreen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
#loginScreen::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(0,229,255,.07) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 15%,rgba(168,85,247,.06) 0%,transparent 55%),
    radial-gradient(ellipse at 60% 85%,rgba(59,130,246,.05) 0%,transparent 50%);
}
[data-theme="light"] #loginScreen::before{
  background:
    radial-gradient(ellipse at 20% 50%,rgba(0,112,224,.07) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 15%,rgba(124,58,237,.05) 0%,transparent 55%);
}
.login-card{
  position:relative;z-index:1;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  padding:44px 40px 36px;
  width:100%;max-width:400px;
  box-shadow:var(--shadow),var(--glow);
  animation:cardIn .4s cubic-bezier(.34,1.2,.64,1);
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}

.login-logo{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:8px;}
.l-hex{
  width:48px;height:48px;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-dsp);font-size:13px;font-weight:800;color:#000;flex-shrink:0;
}
.l-brand{font-family:var(--f-dsp);font-size:30px;font-weight:900;letter-spacing:4px;color:var(--white);}
.l-brand em{color:var(--cyan);font-style:normal;}
.l-sub{text-align:center;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:32px;font-family:var(--f-mono);}

.l-field{margin-bottom:14px;}
.l-field label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-family:var(--f-mono);}
.l-field input{
  width:100%;padding:12px 14px;
  background:var(--bg2);border:1px solid var(--border);
  color:var(--white);font-family:var(--f-mono);font-size:13px;
  border-radius:var(--radius);outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.l-field input::placeholder{color:var(--muted);}
.l-field input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,255,.1);}
[data-theme="light"] .l-field input:focus{box-shadow:0 0 0 3px rgba(0,112,224,.1);}

.l-remember{display:flex;align-items:center;gap:8px;margin-bottom:20px;cursor:pointer;width:fit-content;}
.l-remember input{accent-color:var(--cyan);width:14px;height:14px;}
.l-remember span{font-size:11px;color:var(--muted);font-family:var(--f-mono);}

.l-btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  border:none;border-radius:var(--radius);
  color:#000;font-family:var(--f-dsp);font-size:16px;font-weight:800;
  letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;transition:opacity .2s,transform .15s;
}
.l-btn:hover{opacity:.9;}
.l-btn:active{transform:scale(.98);}
.l-btn:disabled{opacity:.5;cursor:not-allowed;}

.l-error{
  margin-top:12px;padding:10px 14px;
  background:rgba(255,51,85,.08);border:1px solid rgba(255,51,85,.2);
  color:var(--red);font-size:11px;font-family:var(--f-mono);
  border-radius:var(--radius);display:none;text-align:center;
}
.l-hint{
  margin-top:20px;padding:10px 14px;text-align:center;
  font-size:10px;letter-spacing:1px;color:var(--muted);font-family:var(--f-mono);
  background:var(--cyan3);border:1px solid var(--border);border-radius:var(--radius);
}
.l-hint strong{color:var(--cyan);}
.l-badges{display:flex;justify-content:center;gap:14px;margin-top:16px;}
.l-badge{font-size:9px;letter-spacing:1px;color:var(--muted);font-family:var(--f-mono);display:flex;align-items:center;gap:4px;}
.l-badge::before{content:'✓';color:var(--green);}

.l-theme{
  position:absolute;top:16px;right:16px;
  width:34px;height:34px;
  background:none;border:1px solid var(--border);
  color:var(--muted);border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:all .2s;
}
.l-theme:hover{border-color:var(--cyan);color:var(--cyan);}

/* ══════════════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════════════ */
#appShell{display:none;flex-direction:column;height:100%;overflow:hidden;}
#appShell.up{display:flex;}

/* ══════════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════════ */
.hdr{
  height:52px;flex-shrink:0;
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;position:relative;z-index:100;gap:12px;
}
.hdr-l{display:flex;align-items:center;gap:14px;flex:1;min-width:0;}
.hdr-logo{display:flex;align-items:center;gap:9px;flex-shrink:0;text-decoration:none;}
.hdr-hex{
  width:28px;height:28px;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;color:#000;flex-shrink:0;
}
.hdr-name{font-family:var(--f-dsp);font-size:18px;font-weight:800;letter-spacing:2px;color:var(--white);}
.hdr-name em{color:var(--cyan);font-style:normal;}
.hdr-status{
  display:flex;align-items:center;gap:6px;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:var(--f-mono);
}
.h-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;animation:dotPulse 2s infinite;}
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,.4)}50%{box-shadow:0 0 0 5px rgba(0,255,136,0)}}
[data-theme="light"] .h-dot{animation-name:dotPulseL;}
@keyframes dotPulseL{0%,100%{box-shadow:0 0 0 0 rgba(0,153,68,.3)}50%{box-shadow:0 0 0 5px rgba(0,153,68,0)}}

.hdr-c{position:absolute;left:50%;transform:translateX(-50%);text-align:center;}
.hdr-clock{font-size:15px;font-weight:700;color:var(--cyan);letter-spacing:2px;font-family:var(--f-mono);}
.hdr-date{font-size:9px;color:var(--muted);letter-spacing:1px;font-family:var(--f-mono);margin-top:1px;}

.hdr-r{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.hdr-soc{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:var(--f-mono);}

.btn-icon{
  width:34px;height:34px;border-radius:8px;
  background:none;border:1px solid var(--border);
  color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:all .2s;flex-shrink:0;
}
.btn-icon:hover{border-color:var(--cyan);color:var(--cyan);}
.btn-logout{
  height:34px;padding:0 14px;border-radius:8px;
  background:rgba(255,51,85,.07);border:1px solid rgba(255,51,85,.2);
  color:var(--red);cursor:pointer;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:var(--f-mono);
  transition:all .2s;flex-shrink:0;
}
.btn-logout:hover{background:rgba(255,51,85,.14);}

/* ══════════════════════════════════════════════════════════
   PLAN TABS
═══════════════════════════════════════════════════════════ */
.ptabs{
  height:44px;flex-shrink:0;
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:stretch;padding:0 20px;gap:2px;
  overflow-x:auto;scrollbar-width:none;
}
.ptabs::-webkit-scrollbar{display:none;}
.pt{
  display:flex;align-items:center;gap:8px;padding:0 18px;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;
  background:none;border-top:none;border-left:none;border-right:none;
  transition:color .2s,border-color .2s;white-space:nowrap;font-family:var(--f-mono);
}
.pt:hover{color:var(--white);}
.pt.on{color:var(--cyan);border-bottom-color:var(--cyan);}
.pt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:box-shadow .3s;}
.pt-s .pt-dot{background:#64748b;}
.pt-p .pt-dot{background:#00e5ff;}
.pt-a .pt-dot{background:#00ff88;}
.pt-o .pt-dot{background:#a855f7;}
.pt.on .pt-dot{box-shadow:0 0 8px currentColor;}
.p-layers{
  margin-left:auto;align-self:center;flex-shrink:0;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:var(--f-mono);
  padding:3px 10px;border-radius:4px;
  background:var(--cyan3);border:1px solid var(--border);color:var(--cyan);
}

/* ══════════════════════════════════════════════════════════
   DASHBOARD GRID
═══════════════════════════════════════════════════════════ */
.dash{flex:1;overflow:hidden;display:grid;gap:1px;background:var(--border2);padding:1px;}
.panel{
  background:var(--panel);padding:13px 15px;
  position:relative;overflow:hidden;display:flex;flex-direction:column;
  transition:background .35s;
}
.panel::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--cyan),transparent);
  opacity:0;transition:opacity .3s;
}
.panel:hover::after{opacity:.4;}
.ptitle{
  font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;flex-shrink:0;
  display:flex;align-items:center;gap:6px;font-family:var(--f-mono);
}
.ptitle::before{content:'//';color:var(--cyan);opacity:.45;}

/* ══════════════════════════════════════════════════════════
   STAT NUMBERS
═══════════════════════════════════════════════════════════ */
.n-big{
  font-family:var(--f-dsp);font-size:clamp(28px,3vw,50px);
  font-weight:900;line-height:1;color:var(--white);
}
.n-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:5px;font-family:var(--f-mono);}
.n-delta{font-size:10px;margin-top:6px;font-family:var(--f-mono);}
.delta-up{color:var(--red);}
.delta-dn{color:var(--green);}

/* ══════════════════════════════════════════════════════════
   THREAT LOG
═══════════════════════════════════════════════════════════ */
.logfeed{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:2px;}
.le{
  display:flex;align-items:center;gap:7px;
  font-size:10px;line-height:1.6;padding:3px 0;
  border-bottom:1px solid rgba(255,255,255,.02);
  animation:fadeIn .3s ease both;flex-shrink:0;font-family:var(--f-mono);
}
[data-theme="light"] .le{border-bottom-color:rgba(0,0,0,.04);}
@keyframes fadeIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.lt{color:var(--muted);flex-shrink:0;font-size:9px;}
.lb{font-size:8px;letter-spacing:.5px;padding:2px 6px;flex-shrink:0;font-weight:700;border-radius:3px;}
.lb-bl{background:rgba(255,51,85,.14);color:var(--red);}
.lb-wn{background:rgba(255,183,0,.12);color:var(--amber);}
.lb-ok{background:rgba(0,255,136,.1);color:var(--green);}
.lb-ai{background:rgba(168,85,247,.14);color:var(--purple);}
.lb-hp{background:rgba(255,107,0,.12);color:#ff6b00;}
.lip{color:var(--cyan2);flex-shrink:0;}
.lmsg{color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lcc{color:var(--muted);font-size:9px;flex-shrink:0;}

/* ══════════════════════════════════════════════════════════
   LAYER DOTS
═══════════════════════════════════════════════════════════ */
.lv{display:flex;flex-wrap:wrap;gap:2px;flex:1;align-content:flex-start;}
.ld{width:8px;height:8px;border-radius:2px;background:rgba(0,229,255,.1);transition:background .3s;}
.ld.on{background:var(--cyan);}
.ld.off{background:var(--muted2);opacity:.3;}

/* ══════════════════════════════════════════════════════════
   PROGRESS BARS
═══════════════════════════════════════════════════════════ */
.plist{display:flex;flex-direction:column;gap:9px;flex:1;}
.prow{}
.phd{display:flex;justify-content:space-between;margin-bottom:4px;}
.pname{font-size:10px;color:var(--muted);font-family:var(--f-mono);}
.pval{font-size:10px;font-family:var(--f-mono);}
.ptr{height:3px;background:var(--muted2);border-radius:2px;overflow:hidden;}
.pfill{height:100%;border-radius:2px;transition:width 1.5s ease;}

/* ══════════════════════════════════════════════════════════
   IP PLATFORMS
═══════════════════════════════════════════════════════════ */
.ipl{display:flex;flex-direction:column;gap:4px;flex:1;}
.ip-row{
  display:flex;align-items:center;gap:8px;padding:5px 8px;
  background:rgba(0,229,255,.03);border:1px solid rgba(0,229,255,.07);border-radius:4px;
}
.ip-n{font-size:9px;color:var(--muted);flex:1;font-family:var(--f-mono);}
.ip-s{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;}
.s-ok{color:var(--green);background:rgba(0,255,136,.08);}
.s-wn{color:var(--amber);background:rgba(255,183,0,.08);}
.s-bd{color:var(--red);background:rgba(255,51,85,.08);}
.ip-bar{width:56px;height:3px;background:var(--muted2);border-radius:2px;overflow:hidden;}
.ip-fill{height:100%;border-radius:2px;transition:width 1s ease;}
.fc-g{background:var(--green);}
.fc-a{background:var(--amber);}
.fc-r{background:var(--red);}

/* ══════════════════════════════════════════════════════════
   IMMUNE CELLS
═══════════════════════════════════════════════════════════ */
.imgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;flex:1;}
.ic{
  background:rgba(0,229,255,.03);border:1px solid rgba(0,229,255,.08);
  padding:8px;border-radius:4px;
  display:flex;flex-direction:column;gap:3px;position:relative;overflow:hidden;
}
.ic.ok{border-color:rgba(0,255,136,.25);background:rgba(0,255,136,.03);}
.ic.fire{border-color:rgba(168,85,247,.35);background:rgba(168,85,247,.04);}
.ic.alrt{border-color:rgba(255,51,85,.35);background:rgba(255,51,85,.04);}
.ic-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:var(--f-mono);}
.ic-st{font-size:10px;font-weight:700;font-family:var(--f-mono);}
.ic-st.ok{color:var(--green);}
.ic-st.fire{color:var(--purple);}
.ic-st.alrt{color:var(--red);}
.ic-sub{font-size:9px;color:var(--muted);font-family:var(--f-mono);}
.ic-ping{
  position:absolute;top:6px;right:6px;
  width:5px;height:5px;border-radius:50%;
}
.ping-g{background:var(--green);animation:ppg 2s infinite;}
.ping-p{background:var(--purple);animation:ppp 1.5s infinite;}
.ping-r{background:var(--red);animation:ppr 1s infinite;}
@keyframes ppg{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,.4)}50%{box-shadow:0 0 0 4px rgba(0,255,136,0)}}
@keyframes ppp{0%,100%{box-shadow:0 0 0 0 rgba(168,85,247,.4)}50%{box-shadow:0 0 0 4px rgba(168,85,247,0)}}
@keyframes ppr{0%,100%{box-shadow:0 0 0 0 rgba(255,51,85,.4)}50%{box-shadow:0 0 0 4px rgba(255,51,85,0)}}

/* ══════════════════════════════════════════════════════════
   GEO BLOCKS
═══════════════════════════════════════════════════════════ */
.geolist{display:flex;flex-direction:column;gap:4px;flex:1;overflow:hidden;}
.geo-r{
  display:flex;align-items:center;gap:8px;padding:4px 0;
  border-bottom:1px solid rgba(255,255,255,.025);font-family:var(--f-mono);font-size:10px;
}
[data-theme="light"] .geo-r{border-bottom-color:rgba(0,0,0,.04);}
.geo-r .flag{font-size:14px;flex-shrink:0;}
.geo-r .cn{color:var(--white);flex:1;}
.geo-r .ct{color:var(--red);font-weight:700;}
.geo-r .gb{width:48px;height:2px;background:var(--muted2);border-radius:1px;overflow:hidden;}
.geo-r .gf{height:100%;background:var(--red);}

/* ══════════════════════════════════════════════════════════
   AI LOG
═══════════════════════════════════════════════════════════ */
.ailog{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:4px;}
.ai-e{
  font-size:10px;padding:6px 10px;border-radius:0 4px 4px 0;
  background:rgba(168,85,247,.04);
  border-left:2px solid rgba(168,85,247,.35);
  color:var(--muted);animation:fadeIn .3s ease both;
  line-height:1.55;font-family:var(--f-mono);
}
.ai-v{font-weight:700;}

/* ══════════════════════════════════════════════════════════
   HONEYPOT
═══════════════════════════════════════════════════════════ */
.hplog{flex:1;display:flex;flex-direction:column;gap:4px;overflow:hidden;}
.hp-e{
  font-size:9px;padding:5px 9px;border-radius:0 4px 4px 0;
  background:rgba(255,107,0,.04);

  const g = document.createElement('div'); g.className = 'imgrid';
  cells.forEach(c=>{
    g.innerHTML += `<div class="ic ${c.cls}"><div class="ic-ping ping-${c.p}"></div><div class="ic-lbl">${c.n}</div><div class="ic-st ${c.cls==='fire'?'fire':c.cls==='alrt'?'alrt':'ok'}">${c.st}</div><div class="ic-sub">${c.sub}</div></div>`;
  });
  return g;
}

function animNum(id, target, dur=1400){
  const el = document.getElementById(id); if(!el) return;
  let cur = 0; const step = target/(dur/16);
  const t = setInterval(()=>{
    cur += step; if(cur>=target){clearInterval(t);cur=target;}
    el.textContent = Math.floor(cur).toLocaleString();
  },16);
}

// ═══════════════════════════════════════════════════════════
//  SPARKLINE CANVAS
// ═══════════════════════════════════════════════════════════
function drawSpark(){
  const c = document.getElementById('spark'); if(!c) return;
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  c.width = c.offsetWidth*dpr; c.height = 76;
  const pts = Array.from({length:32},()=>95+Math.random()*5);
  const isDark = document.documentElement.getAttribute('data-theme')==='dark';
  const lineColor = isDark ? 'rgba(0,255,136,.65)' : 'rgba(0,153,68,.65)';
  const fillColor = isDark ? 'rgba(0,255,136,.07)' : 'rgba(0,153,68,.06)';
  ctx.strokeStyle=lineColor; ctx.lineWidth=1.5*dpr;
  ctx.shadowColor=lineColor; ctx.shadowBlur=6;
  ctx.beginPath();
  pts.forEach((v,i)=>{
    const x=(i/(pts.length-1))*c.width;
    const y=((100-v)/8)*c.height;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  ctx.fillStyle=fillColor; ctx.shadowBlur=0;
  ctx.lineTo(c.width,c.height); ctx.lineTo(0,c.height); ctx.fill();
}

// ═══════════════════════════════════════════════════════════
//  REAL API POLLING — fetches live data from GPIWD backend
// ═══════════════════════════════════════════════════════════
async function pollApi(){
  const token = getToken();
  if(!token || token==='gpiwd-demo-token') return;
  try {
    const [statsRes, eventsRes] = await Promise.all([
      fetch(`${GW}/admin/gpiwd/stats`, { headers:{'Authorization':'Bearer '+token}, signal:AbortSignal.timeout(6000) }),
      fetch(`${GW}/admin/gpiwd/events?limit=20`, { headers:{'Authorization':'Bearer '+token}, signal:AbortSignal.timeout(6000) }),
    ]);

    if(statsRes.ok){
      const d = await statsRes.json();
      // Update blocked counter
      const bl = document.getElementById('sc-bl');
      if(bl) bl.textContent = (d.overview?.total_blocked||0).toLocaleString();
      // Update passed/ips counter
      const ip = document.getElementById('sc-ip');
      if(ip) ip.textContent = ((d.overview?.total_passed||0) + (d.overview?.total_blocked||0)).toLocaleString();
      // Show circuit breaker alerts
      if(d.circuit_breakers){
        const openCBs = d.circuit_breakers.filter(cb=>cb.state!=='closed');
        if(openCBs.length){
          openCBs.forEach(cb=>{
            pushLog({ts:new Date().toISOString(), ip:'gateway', path:`/${cb.service}/*`, layer:'circuit_breaker', type:'SERVICE_DOWN', reason:`Circuit OPEN: ${cb.service}`});
          });
        }
      }
      // Update topbar live indicator
      const liveEl = document.getElementById('live-count');
      if(liveEl) liveEl.textContent = `${(d.overview?.total_blocked||0).toLocaleString()} blocked`;
    }

    if(eventsRes.ok){
      const events = await eventsRes.json();
      if(events && events.length){
        // Push real events into log (newest first, skip if already shown)
        events.slice(0,5).reverse().forEach(ev=>{
          pushLog(ev);
        });
      }
    }
  } catch {/* demo mode or API unreachable — silent fail */}
}

// Push a real event into the event log UI
function pushLog(ev){
  const log = document.getElementById('evlog') || document.getElementById('logbody');
  if(!log) return;
  const typeColor = {
    IP_BLACKLISTED:'red', RATE_LIMIT:'amber', ATTACK_PATTERN:'red',
    AUTH_FAILED:'amber', AUTHZ_DENIED:'amber', ANOMALY_CRITICAL:'red',
    AI_BLOCKED:'purple', SERVICE_DOWN:'red', MANUAL_BAN:'purple',
  };
  const c = typeColor[ev.type] || 'cyan';
  const row = document.createElement('div');
  row.className = 'lr new';
  row.innerHTML = `<span class="lt">${new Date(ev.ts).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>`
    + `<span class="li ${c==='red'?'lc-r':c==='amber'?'lc-a':c==='purple'?'lc-p':'lc-c'}">${ev.ip||'?'}</span>`
    + `<span class="lm">${ev.layer?.toUpperCase()||'?'} — ${ev.type||''} ${ev.path||''}</span>`;
  log.prepend(row);
  // Keep max 60 rows
  while(log.children.length > 60) log.removeChild(log.lastChild);
  setTimeout(()=>row.classList.remove('new'), 800);
}

// Start real polling after login
function startRealPoll(){
  clearInterval(_apiFetch);
  pollApi(); // immediate first fetch
  _apiFetch = setInterval(pollApi, 30_000); // poll every 30s
}
